<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Drive</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; }

/* BG */
.bg {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-1;
}

/* COINS */
#coins {
  position:fixed; top:10px; right:10px;
  background:rgba(0,0,0,0.6);
  padding:8px 14px;
  border-radius:12px;
  font-weight:bold;
}

/* NAV */
.menuBar {
  position:fixed; bottom:20px;
  width:100%; display:flex;
  justify-content:center; gap:10px;
}

button {
  padding:10px 14px;
  border:none; border-radius:10px;
  font-weight:bold;
}

/* SCREEN */
.screen { display:none; padding:20px; }
.active { display:block; }

/* CARD */
.card {
  padding:20px;
  border-radius:15px;
  background:#111;
}

.common { box-shadow:0 0 8px gray; }
.uncommon { box-shadow:0 0 10px green; }
.rare { box-shadow:0 0 12px blue; }
.epic { box-shadow:0 0 14px purple; }
.legendary { box-shadow:0 0 16px orange; }
.ultimate { box-shadow:0 0 20px red; }

/* PLAYER ROW */
.playerRow {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
}

/* POPUP */
.popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<img class="bg" src="bg.png.PNG">

<div id="coins">Coins: 0</div>

<div id="menu" class="active">
  <div class="menuBar">
    <button onclick="openScreen('packs')">Packs</button>
    <button onclick="openScreen('team')">Team</button>
  </div>
</div>

<div id="packs" class="screen">
  <h2>Packs</h2>
  <button onclick="buyPack('starter')">Starter (200)</button>
  <button onclick="buyPack('pro')">Pro (500)</button>
  <button onclick="buyPack('elite')">Elite (1200)</button>
  <button onclick="freePack()">FREE 75+</button>

  <h3>Redeem</h3>
  <input id="codeInput">
  <button onclick="redeem()">Enter</button>

  <br><br>
  <button onclick="openScreen('menu')">Back</button>
</div>

<div id="team" class="screen">
  <h2>Team OVR: <span id="teamOvr">0</span></h2>
  <div id="lineup"></div>

  <h3>Bench</h3>
  <div id="bench"></div>

  <button onclick="openScreen('menu')">Back</button>
</div>

<div id="popup" class="popup">
  <div id="card"></div>
</div>

<script>

// ===== DATA =====
let coins=100000;
let players=[];
let lineup={qb:null,rb:null,wr1:null,wr2:null,ol:null};
let usedFree=false;

// ===== UTIL =====
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function rarity(o){
  if(o<70)return"common";
  if(o<80)return"uncommon";
  if(o<90)return"rare";
  if(o<95)return"epic";
  if(o<99)return"legendary";
  return"ultimate";
}

// ===== PACK ODDS =====
function rollOvr(type){

  if(type==="starter"){
    return weighted([
      [60,69,70],
      [70,79,25],
      [80,89,5]
    ]);
  }

  if(type==="pro"){
    return weighted([
      [70,79,60],
      [80,89,30],
      [90,94,9],
      [95,98,1]
    ]);
  }

  if(type==="elite"){
    return weighted([
      [80,89,65],
      [90,94,25],
      [95,98,9],
      [99,99,1]
    ]);
  }
}

function weighted(arr){
  let total=arr.reduce((a,b)=>a+b[2],0);
  let r=Math.random()*total;
  for(let [min,max,w] of arr){
    if((r-=w)<=0) return rand(min,max);
  }
}

// ===== PLAYER GEN =====
function genPlayer(ovr){

  const pos=["QB","RB","WR","OL"][rand(0,3)];

  let arch;

  if(pos==="QB"){
    arch=Math.random()<0.5?"Scrambler":"Pocket";
  }

  if(pos==="RB"){
    arch=Math.random()<0.5?"Power":"Elusive";
  }

  if(pos==="WR"){
    arch=Math.random()<0.5?"Speed":"Route";
  }

  if(pos==="OL"){
    arch="Blocker";
  }

  return {
    id:Date.now()+Math.random(),
    name:["Jaxon","Mason","Rico","Malik"][rand(0,3)],
    pos, ovr, arch,
    rarity:rarity(ovr),
    stats:genStats(pos,arch,ovr)
  };
}

// ===== STATS =====
function genStats(pos,arch,ovr){

  let s={};

  if(pos==="QB"){
    s.Accuracy=arch==="Pocket"?ovr+5:ovr-5;
    s.Speed=arch==="Scrambler"?ovr+5:ovr-10;
    s.Strength=ovr;
  }

  if(pos==="RB"){
    s.Speed=ovr;
    s.Agility=arch==="Elusive"?ovr+5:ovr;
    s.Power=arch==="Power"?ovr+5:ovr;
  }

  if(pos==="WR"){
    s.Speed=ovr;
    s.Catch=ovr;
  }

  if(pos==="OL"){
    s.Block=ovr+5;
    s.Strength=ovr;
  }

  return s;
}

// ===== BUY PACK =====
function buyPack(type){

  let cost={starter:200,pro:500,elite:1200}[type];
  if(coins<cost)return;

  coins-=cost;

  let ovr=rollOvr(type);
  let p=genPlayer(ovr);

  players.push(p);
  showCard(p);

  updateCoins();
  save();
}

// ===== FREE PACK =====
function freePack(){
  if(usedFree)return;
  usedFree=true;

  let p=genPlayer(rand(75,85));
  players.push(p);
  showCard(p);
  save();
}

// ===== CARD =====
function showCard(p){
  document.getElementById("card").innerHTML=`
    <div class="card ${p.rarity}">
      <h2>${p.name}</h2>
      <p>${p.pos} • ${p.arch}</p>
      <p>${p.ovr} OVR</p>
      <button onclick="closePopup()">OK</button>
    </div>
  `;
  popup.style.display="flex";
}
function closePopup(){popup.style.display="none";}

// ===== TEAM =====
function openScreen(id){
  document.querySelectorAll(".screen,#menu").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="team")renderTeam();
}

function renderTeam(){

  let total=0,count=0;

  lineupDiv.innerHTML="";
  bench.innerHTML="";

  for(let s in lineup){
    let p=lineup[s];

    lineupDiv.innerHTML+=`
      <div class="playerRow">
        <div>${s}</div>
        <div>${p?p.name:"Empty"}</div>
      </div>
    `;

    if(p){total+=p.ovr;count++;}
  }

  teamOvr.textContent=count?Math.round(total/count):0;

  players.forEach(p=>{
    if(!Object.values(lineup).includes(p)){
      bench.innerHTML+=`
        <div class="playerRow">
          <div>${p.name} (${p.ovr})</div>
          <div>
            <button onclick="add('${p.id}')">Add</button>
            <button onclick="sell('${p.id}')">Sell</button>
          </div>
        </div>
      `;
    }
  });
}

function add(id){
  let p=players.find(x=>x.id==id);

  if(p.pos==="QB")lineup.qb=p;
  if(p.pos==="RB")lineup.rb=p;
  if(p.pos==="WR"){
    if(!lineup.wr1)lineup.wr1=p;
    else lineup.wr2=p;
  }
  if(p.pos==="OL")lineup.ol=p;

  renderTeam();
}

function sell(id){
  let p=players.find(x=>x.id==id);
  if(!confirm("Quicksell?"))return;

  coins+=Math.floor(p.ovr*10/2);
  players=players.filter(x=>x.id!=id);

  updateCoins();
  renderTeam();
}

// ===== REDEEM =====
function redeem(){
  let code=codeInput.value;

  if(code==="TEST100K")coins+=100000;
  else if(code==="TEST100M")coins+=100000000;
  else return;

  updateCoins();
  save();
}

// ===== SAVE =====
function save(){
  localStorage.setItem("coins",coins);
  localStorage.setItem("players",JSON.stringify(players));
  localStorage.setItem("usedFree",usedFree);
}

function load(){
  coins=Number(localStorage.getItem("coins"))||100000;
  players=JSON.parse(localStorage.getItem("players"))||[];
  usedFree=JSON.parse(localStorage.getItem("usedFree"))||false;
}

load();
updateCoins();

</script>

</body>
</html>

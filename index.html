<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Drive</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* HUD */
#coinsDisplay {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  padding: 8px 14px;
  border-radius: 12px;
  font-weight: bold;
}

/* MENU */
.menuBar {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
}

/* SCREENS */
.screen {
  display: none;
  padding: 20px;
}
.active {
  display: block;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.common { border: 2px solid gray; }
.uncommon { border: 2px solid green; }
.rare { border: 2px solid blue; }
.epic { border: 2px solid purple; }
.legendary { border: 2px solid orange; }
.ultimate { border: 2px solid red; }

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img class="bg" src="bg.png" onerror="this.style.display='none'">

<!-- COINS -->
<div id="coinsDisplay">Coins: 0</div>

<!-- MENU -->
<div id="menu" class="active">
  <div class="menuBar">
    <button onclick="openScreen('packs')">Packs</button>
    <button onclick="openScreen('team')">Team</button>
  </div>
</div>

<!-- PACKS -->
<div id="packs" class="screen">
  <h2>Packs</h2>
  <button onclick="buyPack(200)">Starter (200)</button>
  <button onclick="buyPack(500)">Pro (500)</button>
  <br><br>
  <button onclick="openScreen('menu')">Back</button>
</div>

<!-- TEAM -->
<div id="team" class="screen">
  <h2>Your Team (placeholder)</h2>
  <p>Team system comes next</p>
  <button onclick="openScreen('menu')">Back</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div id="card"></div>
</div>

<script>
let coins = 100000;

// LOAD/SAVE
function save() {
  localStorage.setItem("coins", coins);
}
function load() {
  coins = Number(localStorage.getItem("coins")) || 100000;
}
load();

// UI UPDATE
function updateCoins() {
  document.getElementById("coinsDisplay").textContent = "Coins: " + coins;
}
updateCoins();

// NAVIGATION
function openScreen(id) {
  document.querySelectorAll(".screen, #menu").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// RARITY
function rarity(ovr) {
  if (ovr < 70) return "common";
  if (ovr < 80) return "uncommon";
  if (ovr < 90) return "rare";
  if (ovr < 95) return "epic";
  if (ovr < 99) return "legendary";
  return "ultimate";
}

// BUY PACK
function buyPack(cost) {
  if (coins < cost) return;

  coins -= cost;
  updateCoins();
  save();

  let ovr = cost === 200 ? rand(60,80) : rand(70,95);

  showCard(ovr);
}

// SHOW CARD
function showCard(ovr) {
  const r = rarity(ovr);

  document.getElementById("card").innerHTML = `
    <div class="card ${r}">
      <h2>${ovr} OVR</h2>
      <p>${r.toUpperCase()}</p>
      <button onclick="closePopup()">OK</button>
    </div>
  `;

  document.getElementById("popup").style.display = "flex";
}

// CLOSE
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// RANDOM
function rand(a,b){
  return Math.floor(Math.random()*(b-a+1))+a;
}
</script>

</body>
</html>

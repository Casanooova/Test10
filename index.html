<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Drive</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* COINS */
#coins {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  padding: 8px 14px;
  border-radius: 12px;
  font-weight: bold;
}

/* NAV */
.menuBar {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

/* SCREENS */
.screen { display:none; padding:20px; }
.active { display:block; }

/* PLAYER CARD */
.card {
  padding:20px;
  border-radius:15px;
  background:#111;
}

.common { box-shadow:0 0 10px gray; }
.uncommon { box-shadow:0 0 10px green; }
.rare { box-shadow:0 0 12px blue; }
.epic { box-shadow:0 0 14px purple; }
.legendary { box-shadow:0 0 16px orange; }
.ultimate { box-shadow:0 0 20px red; }

/* POPUP */
.popup {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

/* TEAM */
.playerRow {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<img class="bg" src="bg.png.PNG">

<div id="coins">Coins: 0</div>

<!-- MENU -->
<div id="menu" class="active">
  <div class="menuBar">
    <button onclick="openScreen('packs')">Packs</button>
    <button onclick="openScreen('team')">Team</button>
  </div>
</div>

<!-- PACKS -->
<div id="packs" class="screen">
  <h2>Packs</h2>
  <button onclick="buyPack(200)">Starter</button>
  <button onclick="buyPack(500)">Pro</button>
  <br><br>
  <button onclick="openScreen('menu')">Back</button>
</div>

<!-- TEAM -->
<div id="team" class="screen">
  <h2>Team OVR: <span id="teamOvr">0</span></h2>

  <div id="lineup"></div>

  <h3>Bench</h3>
  <div id="bench"></div>

  <br>
  <button onclick="openScreen('menu')">Back</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div id="card"></div>
</div>

<script>

// ================= DATA =================

let coins = 100000;

let lineup = {
  qb:null, rb:null, wr1:null, wr2:null, ol:null
};

let players = [];

// ================= UTIL =================

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function rarity(ovr){
  if(ovr<70)return"common";
  if(ovr<80)return"uncommon";
  if(ovr<90)return"rare";
  if(ovr<95)return"epic";
  if(ovr<99)return"legendary";
  return"ultimate";
}

function updateCoins(){
  document.getElementById("coins").textContent="Coins: "+coins;
}

// ================= PACK =================

function buyPack(cost){
  if(coins<cost)return;

  coins-=cost;

  let ovr = cost===200 ? rand(60,80) : rand(70,95);

  let player = generatePlayer(ovr);

  players.push(player);

  showCard(player);

  updateCoins();
  save();
}

// ================= PLAYER =================

function generatePlayer(ovr){
  const positions=["QB","RB","WR","OL"];
  const pos=positions[rand(0,positions.length-1)];

  const names=["Jaxon","Mason","Ty","Cole","Rico","Malik"];
  const last=["Reed","Stone","Lane","Turner","Price","Cross"];

  return {
    id:Date.now()+Math.random(),
    name:names[rand(0,5)]+" "+last[rand(0,5)],
    pos,
    ovr,
    rarity:rarity(ovr)
  };
}

// ================= CARD =================

function showCard(p){
  document.getElementById("card").innerHTML=`
    <div class="card ${p.rarity}">
      <h2>${p.name}</h2>
      <p>${p.pos} • ${p.ovr} OVR</p>
      <button onclick="closePopup()">OK</button>
    </div>
  `;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

// ================= TEAM =================

function openScreen(id){
  document.querySelectorAll(".screen,#menu").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="team") renderTeam();
}

function renderTeam(){

  const lineupDiv=document.getElementById("lineup");
  const benchDiv=document.getElementById("bench");

  lineupDiv.innerHTML="";
  benchDiv.innerHTML="";

  let total=0,count=0;

  for(let slot in lineup){
    const p=lineup[slot];

    lineupDiv.innerHTML+=`
      <div class="playerRow">
        <div>${slot.toUpperCase()}</div>
        <div>${p?p.name:"Empty"}</div>
      </div>
    `;

    if(p){ total+=p.ovr; count++; }
  }

  document.getElementById("teamOvr").textContent=
    count?Math.round(total/count):0;

  players.forEach(p=>{
    if(!Object.values(lineup).includes(p)){
      const div=document.createElement("div");
      div.className="playerRow";
      div.innerHTML=`
        <div>${p.name} (${p.ovr})</div>
        <div>
          <button onclick="addToLineup('${p.id}')">Add</button>
          <button onclick="sell('${p.id}')">Sell</button>
        </div>
      `;
      benchDiv.appendChild(div);
    }
  });
}

function addToLineup(id){
  const p=players.find(x=>x.id==id);
  if(!p)return;

  if(p.pos==="QB") lineup.qb=p;
  if(p.pos==="RB") lineup.rb=p;
  if(p.pos==="WR"){
    if(!lineup.wr1) lineup.wr1=p;
    else lineup.wr2=p;
  }
  if(p.pos==="OL") lineup.ol=p;

  renderTeam();
}

function sell(id){
  const p=players.find(x=>x.id==id);
  if(!p)return;

  if(!confirm("Sell player?"))return;

  coins+=Math.floor(p.ovr*10/2);
  players=players.filter(x=>x.id!=id);

  updateCoins();
  renderTeam();
}

// ================= SAVE =================

function save(){
  localStorage.setItem("coins",coins);
  localStorage.setItem("players",JSON.stringify(players));
}

function load(){
  coins=Number(localStorage.getItem("coins"))||100000;
  players=JSON.parse(localStorage.getItem("players"))||[];
}

load();
updateCoins();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pocket Drive</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* MENU */
.menu {
  position: relative;
  height: 100vh;
}

.menu img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.menuBar {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

/* PLAYER CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.common { border: 2px solid gray; }
.uncommon { border: 2px solid green; }
.rare { border: 2px solid blue; }
.epic { border: 2px solid purple; }
.legendary { border: 2px solid orange; }
.ultimate { border: 2px solid red; }

/* POPUP */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

</style>
</head>

<body>

<div class="menu">
  <img src="bg.png">
  <div class="menuBar">
    <button onclick="openPacks()">Packs</button>
    <button onclick="openTeam()">Team</button>
  </div>
</div>

<div id="packScreen" style="display:none;">
  <h2>Packs</h2>
  <button onclick="buyPack(200)">Starter (200)</button>
  <button onclick="buyPack(500)">Pro (500)</button>
</div>

<div id="popup" class="popup">
  <div id="card"></div>
</div>

<script>
let coins = 100000;

function save() {
  localStorage.setItem("coins", coins);
}

function load() {
  coins = Number(localStorage.getItem("coins")) || 100000;
}
load();

function openPacks() {
  document.querySelector(".menu").style.display = "none";
  document.getElementById("packScreen").style.display = "block";
}

function rarity(ovr) {
  if (ovr < 70) return "common";
  if (ovr < 80) return "uncommon";
  if (ovr < 90) return "rare";
  if (ovr < 95) return "epic";
  if (ovr < 99) return "legendary";
  return "ultimate";
}

function buyPack(cost) {
  if (coins < cost) return;

  coins -= cost;

  let ovr;
  if (cost === 200) {
    ovr = rand(60, 80);
  } else {
    ovr = rand(70, 95);
  }

  showCard(ovr);
  save();
}

function showCard(ovr) {
  const r = rarity(ovr);

  document.getElementById("card").innerHTML = `
    <div class="card ${r}">
      <h2>${ovr} OVR</h2>
      <p>${r.toUpperCase()}</p>
      <button onclick="closePopup()">OK</button>
    </div>
  `;

  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
</script>

</body>
</html>
